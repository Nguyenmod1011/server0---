# ============================================================
# nginx.conf – Cấu hình Nginx cho License System
# ============================================================
# Copy vào /etc/nginx/sites-available/license và symlink:
#   sudo ln -s /etc/nginx/sites-available/license /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS (bật khi đã có SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    root /var/www/html/license_system;
    index index.php;

    # ── SSL (Let's Encrypt) ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                   always;
    add_header X-Frame-Options         "DENY"                      always;
    add_header X-XSS-Protection        "1; mode=block"             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Chặn truy cập file nhạy cảm ────────────────────────
    location ~* \.(sql|log|bak|sh|env|htaccess)$ {
        deny all;
        return 403;
    }

    # Chặn truy cập config.php và install.php trực tiếp
    location ~ ^/(config|install)\.php$ {
        deny all;
        return 403;
    }

    # Chặn truy cập includes/
    location ~ ^/admin/includes/ {
        deny all;
        return 403;
    }

    # ── API rate limiting ───────────────────────────────────
    # Giới hạn 30 requests/phút/IP vào api.php
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    location = /api.php {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── PHP ─────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    # ── Static files ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Tắt directory listing ────────────────────────────────
    autoindex off;

    # ── Logs ────────────────────────────────────────────────
    access_log /var/log/nginx/license_access.log;
    error_log  /var/log/nginx/license_error.log;

    # ── Client max body (cho upload file import) ─────────────
    client_max_body_size 5M;
}

# ============================================================
# Cài SSL với Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ============================================================
